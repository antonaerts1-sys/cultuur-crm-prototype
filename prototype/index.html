<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultuur CRM — Deelplatform</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A1A2E;--body:#4A4A68;--muted:#9CA3AF;
  --accent:#1DA882;--accent-light:#ECFDF5;--accent-dark:#178F6F;
  --coral:#EF4444;--coral-light:#FEF2F2;
  --amber:#F59E0B;--amber-light:#FFFBEB;
  --blue:#3B82F6;--blue-light:#EFF6FF;
  --purple:#8B5CF6;--purple-light:#F5F3FF;
  --bg:#FFFFFF;--surface:#F9FAFB;--border:#F0F0F5;
  --sidebar-bg:#FFFFFF;--sidebar-text:#6B7280;--sidebar-active:#1A1A2E;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;font-size:14px;line-height:1.6;color:var(--body);background:var(--surface);-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh}

/* ── Sidebar ── */
.sidebar{width:260px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;color:var(--sidebar-text);overflow-y:auto}
.sidebar-logo{padding:28px 24px 24px;display:flex;align-items:center;gap:12px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:20px;height:20px}
.logo-text{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-0.03em}
.logo-text span{font-weight:500;color:var(--muted);font-size:11px;display:block;margin-top:2px;letter-spacing:0;text-transform:none}
.sidebar-section{padding:0 12px;margin-bottom:4px}
.sidebar-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:20px 12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--sidebar-text);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface);color:var(--sidebar-active)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.5}
.nav-item:hover svg{opacity:.7}
.nav-item.active svg{opacity:1}
.nav-count{margin-left:auto;font-size:11px;background:var(--surface);padding:2px 8px;border-radius:999px;font-weight:600;color:var(--muted)}
.sidebar-footer{padding:20px 24px;margin-top:auto;border-top:1px solid var(--border)}
.sidebar-org{font-size:14px;font-weight:600;color:var(--ink)}
.sidebar-season{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Main ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--surface)}
.topbar{padding:24px 40px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0}
.topbar h1{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.03em}
.topbar-sub{font-size:13px;color:var(--muted);margin-top:3px;font-weight:400}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:32px 40px;flex:1}

/* ── Components ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.btn{border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:6px}
.btn svg{width:14px;height:14px}
.btn-sm svg{width:13px;height:13px}
td svg{width:14px;height:14px}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:white;border:none}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:white;color:var(--ink);border:1px solid var(--border)}
.btn-secondary:hover{border-color:#D1D5DB;background:var(--surface)}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--muted);padding:8px 10px}
.btn-ghost:hover{color:var(--ink);transform:none}
.input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-family:inherit;color:var(--ink);width:100%;outline:none;background:var(--bg);transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:#C4C9D2}
select.input{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239CA3AF' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}

/* Tags */
.tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em}
.tag-default{background:var(--surface);color:var(--body);border:1px solid var(--border)}
.tag-green{background:var(--accent-light);color:#137D5F}
.tag-coral{background:var(--coral-light);color:#C43D49}
.tag-blue{background:var(--blue-light);color:#1A5FB4}
.tag-amber{background:var(--amber-light);color:#A87314}
.tag-purple{background:var(--purple-light);color:#6D28D9}
.tag+.tag{margin-left:3px}

/* Source dots */
.source{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600}
.source-dot{width:7px;height:7px;border-radius:50%}
.src-tm{color:#FF6B00}.src-tm .source-dot{background:#FF6B00}
.src-mc{color:#F5A623}.src-mc .source-dot{background:#F5A623}
.src-yp{color:#4CAF50}.src-yp .source-dot{background:#4CAF50}
.src-zs{color:#9C27B0}.src-zs .source-dot{background:#9C27B0}
.sources-row{display:flex;gap:10px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400}

/* Tables */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
td{padding:16px 18px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--surface)}
.contact-name{font-weight:600;color:var(--ink);font-size:14px}
.contact-email{color:var(--muted);font-size:12px;margin-top:2px}

/* Sections */
.section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-0.02em}

/* Screens */
.screen{display:none}
.screen.active{display:flex;flex-direction:column;height:100%}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:12px 24px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}

/* Activity feed */
.act-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-icon{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-icon svg{width:14px;height:14px}
.act-title{font-weight:600;color:var(--ink);font-size:13px}
.act-sub{color:var(--muted);font-size:12px;margin-top:2px}
.act-time{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap;font-weight:400}

/* Profile */
.profile-avatar{width:56px;height:56px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;flex-shrink:0}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--muted);font-weight:400}
.detail-value{font-weight:600;color:var(--ink);text-align:right}

/* Timeline */
.tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.tl-title{font-size:13px;font-weight:600;color:var(--ink)}
.tl-date{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}

/* Filters */
.filters-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.filters-bar .input{max-width:300px}

/* Progress bar */
.progress{height:6px;background:#EAECF0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:24px}

/* Production cards */
.prod-card{cursor:pointer;transition:all .15s}
.prod-card:hover{border-color:#D1D5DB}
.prod-genre{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.prod-title{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;margin:8px 0 4px}
.prod-artist{font-size:14px;color:var(--muted);font-weight:400}
.prod-meta{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.prod-meta strong{color:var(--ink)}

/* Campaign cards */
.campaign-card .cs-label{font-size:11px;color:var(--muted);font-weight:500}
.campaign-card .cs-val{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;margin-top:4px}
.campaign-stats{display:flex;gap:24px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}

/* Segment builder */
.rule-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.rule-row select,.rule-row input[type="text"]{border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none}
.rule-row select:focus,.rule-row input:focus{border-color:var(--accent)}
.rule-row select{min-width:160px}
.rule-connector{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;padding:6px 0}

/* Sync rows */
.sync-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.sync-row:last-child{border-bottom:none}
.sync-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:white;flex-shrink:0}
.sync-name{font-weight:600;color:var(--ink);font-size:14px}
.sync-meta{font-size:12px;color:var(--muted)}
.sync-right{margin-left:auto;text-align:right}

/* Toggle */
.toggle{width:44px;height:24px;border-radius:12px;background:#D1D5DB;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* Consent row */
.consent-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);font-size:13px}
.consent-row:last-child{border-bottom:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,25,.5);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;padding:28px}
.modal h2{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;margin-bottom:16px}

/* Benchmark bars */
.bench-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
.bench-row:last-child{border-bottom:none}
.bench-label{width:200px;font-size:14px;font-weight:500;color:var(--ink);flex-shrink:0}
.bench-bar{flex:1;height:20px;background:var(--surface);border-radius:4px;position:relative;overflow:hidden}
.bench-fill{height:100%;border-radius:4px;position:absolute;top:0;left:0}
.bench-val{width:50px;text-align:right;font-size:13px;font-weight:700;color:var(--ink)}
.bench-avg{position:absolute;top:0;height:100%;width:2px;background:var(--coral);z-index:1}

/* Responsive */
/* Tags fine-tuning */
.tag{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500}

@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3,.grid-23,.profile-grid{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}}
</style>
</head>

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const genreTag = g => `<span class="tag tag-${DATA.genreColors[g]||'default'}">${g}</span>`;
const sourceTag = s => { const src = DATA.sources.find(x=>x.id===s); return src ? `<span class="source src-${s}"><span class="source-dot"></span>${src.short}</span>` : ''; };
const roleTag = r => { const colors = {Bezoeker:'default',Artiest:'coral',Gezelschap:'blue',Partner:'blue',Pers:'amber',Curator:'purple',Coproducent:'blue',Gastlocatie:'blue',Vrijwilliger:'green',Nieuwsbrief:'green',Donor:'amber','Trouwe bezoeker':'green',Leverancier:'default',Leerkracht:'default'}; return `<span class="tag tag-${colors[r]||'default'}">${r}</span>`; };
const pct = (n,t) => t>0?Math.round(n/t*100):0;
const fmtN = n => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');

function svgBar(data, w, h, barColor='var(--accent)') {
  const max = Math.max(...data.map(d=>d.v));
  const bw = Math.floor((w-20)/data.length)-4;
  let bars = '';
  data.forEach((d,i) => {
    const bh = (d.v/max)*(h-30);
    const x = 10+i*(bw+4);
    const y = h-20-bh;
    bars += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${barColor}" opacity="0.85"/>`;
    bars += `<text x="${x+bw/2}" y="${h-6}" text-anchor="middle" font-size="9" font-weight="600" fill="var(--muted)">${d.m}</text>`;
  });
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}">${bars}</svg>`;
}

function navigate(screen, opts={}) {
  currentScreen = screen;
  if(opts.productionId) currentProductionId = opts.productionId;
  if(opts.contactId) currentContactId = opts.contactId;
  if(opts.campaignId) currentCampaignId = opts.campaignId;
  $$('.screen').forEach(s => s.classList.remove('active'));
  $(`#screen-${screen}`).classList.add('active');
  renderSidebar();
  renderScreen(screen);
  $('.main').scrollTo(0,0);
}

function renderProfiel() {
  const c = DATA.contacts.find(x=>x.id===currentContactId) || DATA.contacts[0];
  const el = $('#screen-profiel');
  const stage = c.tickets12m>=5?'Trouw':c.tickets12m>=2?'Terugkerend':c.tickets12m>=1?'Eerste bezoek':'Onbekend';
  const stageColor = {Trouw:'var(--amber)',Terugkerend:'var(--accent)','Eerste bezoek':'var(--blue)',Onbekend:'var(--muted)'}[stage];
  const relatedProds = c.roles.includes('Artiest')||c.roles.includes('Gezelschap') ? DATA.productions.filter(p=>p.artist.toLowerCase().includes(c.name.split(' ')[0].toLowerCase())).slice(0,3) : [];
  const hasConflicts = c.fields && Object.values(c.fields).some(f=>f.conflict);
  const sourceNames = {tm:'Ticketmatic',mc:'Mailchimp',yp:'Yesplan',zs:'Zensoft',crm:'Handmatig'};

  // Helper: field row with source attribution
  function fieldRow(label, fieldKey, fallbackValue) {
    const f = c.fields && c.fields[fieldKey];
    if(!f && !fallbackValue) return '';
    const val = f ? f.value : fallbackValue;
    const src = f ? DATA.sources.find(s=>s.id===f.source) : null;
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <span style="font-size:13px;color:var(--muted)">${label}</span>
        <div style="text-align:right">
          <div style="font-weight:600;color:var(--ink);font-size:13px">${val}</div>
          ${src?`<div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:3px"><span class="source src-${f.source}"><span class="source-dot"></span>${src.short}</span><span style="font-size:10px;color:var(--muted)">${f.lastSync}</span></div>`:''}
        </div>
      </div>
      ${f&&f.conflict?`<div style="margin-top:8px;padding:8px 12px;background:var(--amber-light);border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:center;gap:8px">
        <span style="color:var(--amber);font-weight:600">Conflict</span>
        <span style="color:var(--body)">${sourceNames[f.conflict.source]||f.conflict.source}: "${f.conflict.value}"</span>
        <span style="color:var(--muted);font-size:11px">— ${f.conflict.reason}</span>
        <button class="btn btn-secondary btn-sm" style="margin-left:auto;padding:4px 10px;font-size:11px">Oplossen</button>
      </div>`:''}
    </div>`;
  }

  el.innerHTML = `
  <div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="btn btn-ghost" onclick="navigate('contacten')">${ICONS.back}</button><h1>${c.name}</h1></div><div class="topbar-actions">${hasConflicts?`<span class="tag tag-amber" style="margin-right:4px">Conflicten</span>`:''}<button class="btn btn-secondary btn-sm">Bewerk</button><button class="btn btn-secondary btn-sm">Campagne</button></div></div>
  <div class="content">
    <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:28px">
      <div class="profile-avatar" style="background:${c.color}">${c.avatar}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-0.03em">${c.name}</div>
          <span class="tag" style="background:${stageColor};color:white">${stage}</span>
        </div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">${c.email}${c.address?` — ${c.address.split(',').pop().trim()}`:''}</div>
        <div style="margin-top:10px;display:flex;gap:4px;flex-wrap:wrap">${c.roles.map(r=>roleTag(r)).join('')}</div>
        <div style="margin-top:10px;display:flex;gap:16px;align-items:center">
          <div class="sources-row">${c.sources.map(s=>sourceTag(s)).join('')}</div>

        </div>
      </div>
      ${c.tickets12m>0?`<div style="text-align:right">
        <div style="font-size:28px;font-weight:700;color:var(--ink)">${c.tickets12m}</div>
        <div style="font-size:12px;color:var(--muted)">tickets (12m)</div>
        ${c.spent?`<div style="font-size:16px;font-weight:600;color:var(--ink);margin-top:4px">&euro; ${c.spent}</div>`:''}
      </div>`:''}
    </div>

    <div class="tabs" id="profiel-tabs">
      <button class="tab active" onclick="switchProfielTab('overzicht')">Overzicht</button>
      <button class="tab" onclick="switchProfielTab('bronnen')">Bronnen & data</button>
      <button class="tab" onclick="switchProfielTab('tijdlijn')">Tijdlijn</button>
      <button class="tab" onclick="switchProfielTab('consent')">GDPR & consent</button>
    </div>

    <!-- TAB: Overzicht -->
    <div id="profiel-tab-overzicht" class="tab-content active">
      <div class="profile-grid">
        <div>
          <div class="card section"><div class="section-title" style="margin-bottom:14px">Contactgegevens</div>
            ${fieldRow('E-mail','email',c.email)}
            ${fieldRow('Telefoon','phone',c.phone)}
            ${fieldRow('Adres','address',c.address)}
            ${fieldRow('Taal','lang',c.lang)}
          </div>
          ${c.tickets12m>0?`<div class="card section"><div class="section-title" style="margin-bottom:14px">Bezoekprofiel</div>
            ${c.since?`<div class="detail-row"><span class="detail-label">Eerste bezoek</span><span class="detail-value">${c.since}</span></div>`:''}
            <div class="detail-row"><span class="detail-label">Stadium</span><span class="detail-value" style="color:${stageColor};font-weight:700">${stage}</span></div>
            ${c.pref?`<div class="detail-row"><span class="detail-label">Voorkeur genres</span><span class="detail-value">${c.pref.join(', ')}</span></div>`:''}
            ${c.spent?`<div class="detail-row"><span class="detail-label">Besteding (12m)</span><span class="detail-value">&euro; ${c.spent},00</span></div>`:''}
          </div>`:''}
        </div>
        <div>
          ${relatedProds.length>0?`<div class="card section"><div class="section-title" style="margin-bottom:14px">Gekoppelde producties</div>
            ${relatedProds.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate('productie-detail',{productionId:${p.id}})"><div style="flex:1"><div style="font-weight:600;color:var(--ink);font-size:13px">${p.title}</div><div style="font-size:12px;color:var(--muted)">${p.dates}</div></div>${genreTag(p.genre)}</div>`).join('')}
          </div>`:''}
          <div class="card section">
            <div class="section-header"><div class="section-title">Notities</div><button class="btn btn-secondary btn-sm">${ICONS.plus} Toevoegen</button></div>
            ${c.timeline&&c.timeline.find(t=>t.type==='note')?c.timeline.filter(t=>t.type==='note').map(n=>`<div style="padding:12px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:8px"><div style="font-size:13px;color:var(--ink)">${n.title.replace('Notitie: ','')}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${n.date} — ${n.by||''}</div></div>`).join(''):`<p style="font-size:13px;color:var(--muted)">Nog geen notities. Voeg context toe die niet verloren mag gaan.</p>`}
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: Bronnen & data (NIEUW) -->
    <div id="profiel-tab-bronnen" class="tab-content">
      <div class="grid-2">
        <div class="card">
          <div class="section-title" style="margin-bottom:16px">Gekoppelde systemen</div>
          ${c.sources.map(sid=>{
            const src = DATA.sources.find(s=>s.id===sid);
            return src?`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
              <div class="sync-icon" style="background:${src.color};width:32px;height:32px;font-size:11px">${src.short}</div>
              <div style="flex:1"><div style="font-weight:600;color:var(--ink);font-size:13px">${src.name}</div><div style="font-size:11px;color:var(--muted)">${src.desc}</div></div>
              <span class="tag tag-green">Verbonden</span>
            </div>`:'';
          }).join('')}
          ${c.sources.length<4?`<div style="padding:12px 0;font-size:12px;color:var(--muted)">${4-c.sources.length} systemen niet gekoppeld aan dit contact</div>`:''}
        </div>
        <div class="card">
          <div class="section-title" style="margin-bottom:16px">Data per veld</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Per veld wordt getoond welk systeem de bron is en wanneer het laatst gesynchroniseerd is.</div>
          ${c.fields?Object.entries(c.fields).map(([key,f])=>{
            const src = DATA.sources.find(s=>s.id===f.source);
            const label = {email:'E-mail',phone:'Telefoon',address:'Adres',lang:'Taal'}[key]||key;
            return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:12px;color:var(--muted)">${label}</span>
                <div style="display:flex;align-items:center;gap:6px">
                  ${src?`<span class="source src-${f.source}"><span class="source-dot"></span>${src.short}</span>`:''}<span style="font-size:10px;color:var(--muted)">${f.lastSync}</span>
                </div>
              </div>
              <div style="font-size:13px;font-weight:600;color:var(--ink);margin-top:2px">${f.value}</div>
              ${f.conflict?`<div style="margin-top:6px;padding:6px 10px;background:var(--amber-light);border-radius:var(--radius-sm);display:flex;align-items:center;gap:6px;font-size:11px">
                <span style="color:var(--amber);font-weight:600">Conflict:</span>
                <span>${sourceNames[f.conflict.source]}: "${f.conflict.value}"</span>
                <button class="btn btn-secondary btn-sm" style="margin-left:auto;padding:3px 8px;font-size:10px">Oplossen</button>
              </div>`:''}
            </div>`;
          }).join(''):`<p style="font-size:13px;color:var(--muted)">Geen veld-level brondata beschikbaar voor dit contact.</p>`}
        </div>
      </div>
      ${hasConflicts?`<div class="card" style="margin-top:16px;background:var(--amber-light);border-color:#F0D9A0">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:14px;font-weight:600;color:#A87314">Dit contact heeft data-conflicten</div>
          <span style="font-size:13px;color:#A87314">Verschillende systemen geven tegenstrijdige informatie. Los dit op om datakwaliteit te garanderen.</span>
          <button class="btn btn-primary btn-sm" style="margin-left:auto;background:#A87314">Alle conflicten oplossen</button>

    <!-- TAB: Tijdlijn -->
    <div id="profiel-tab-tijdlijn" class="tab-content">
      <div class="card">
        ${c.timeline?c.timeline.map(t=>{
          const dotColor = t.source==='tm'?'#FF6B00':t.source==='mc'?'#F5A623':t.source==='crm'?'var(--accent)':'var(--muted)';
          const srcLabel = sourceNames[t.source]||t.source;
          return `<div class="tl-item"><div class="tl-dot" style="background:${dotColor}"></div><div style="flex:1"><div class="tl-title">${t.title}</div><div class="tl-date">${t.date}${t.by?` — ${t.by}`:''}</div></div><span style="font-size:11px;color:var(--muted)">${srcLabel}</span></div>`;
        }).join(''):`<p style="color:var(--muted);font-size:13px;padding:20px 0">Geen activiteit beschikbaar voor dit contact.</p>`}
      </div>
    </div>

    <!-- TAB: GDPR -->
    <div id="profiel-tab-consent" class="tab-content">
      <div class="card">
        <div class="section-title" style="margin-bottom:16px">Toestemming per kanaal</div>
        ${c.consent?Object.entries(c.consent).map(([k,v])=>`<div class="consent-row"><div><strong style="color:var(--ink);text-transform:capitalize;font-size:14px">${k}</strong><div style="font-size:12px;color:var(--muted);margin-top:2px">Sinds ${v.since}</div></div><div class="toggle ${v.status==='opt-in'?'on':''}"></div></div>`).join('')
        :`<div class="consent-row"><div><strong style="color:var(--ink)">Geen consent data</strong><div style="font-size:12px;color:var(--muted);margin-top:2px">Dit contact heeft nog geen consent-voorkeuren vastgelegd</div></div></div>`}
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm">${ICONS.download} Data export (GDPR)</button>
          <button class="btn btn-secondary btn-sm" style="color:var(--coral);border-color:var(--coral)">Anonimiseer contact</button>
        </div>
      </div>
    </div>
  </div>`;
}

// Modal renderers voor vrijwilligers
function renderVolDetailModal(volId) {
  const f = DATA.vrijwilligers.list.find(v=>v.id===volId);
  if(!f) return '<p>Niet gevonden</p>';
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div>
        <h2 style="margin-bottom:4px">${f.name}</h2>
        <div style="font-size:13px;color:var(--muted)">${f.email} — ${f.phone}</div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()" style="font-size:18px">&times;</button>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:20px">${f.skills.map(s=>`<span class="tag tag-default">${s}</span>`).join('')}<span class="tag tag-${f.status==='Actief'?'green':'default'}">${f.status}</span>${f.certEHBO?'<span class="tag tag-blue">EHBO</span>':''}</div>
    <div class="detail-row"><span class="detail-label">Beschikbaarheid</span><span class="detail-value">${f.available}</span></div>
    <div class="detail-row"><span class="detail-label">Vrijwilliger sinds</span><span class="detail-value">${f.since}</span></div>
    <div class="detail-row"><span class="detail-label">Shifts dit seizoen</span><span class="detail-value">${f.shifts}</span></div>
    <div class="detail-row"><span class="detail-label">Uren dit seizoen</span><span class="detail-value">${f.hours}u</span></div>
    <div class="detail-row"><span class="detail-label">Laatste shift</span><span class="detail-value">${f.lastShift}</span></div>
    <div class="detail-row"><span class="detail-label">T-shirt maat</span><span class="detail-value">${f.tshirtSize}</span></div>
    <div class="detail-row"><span class="detail-label">Noodcontact</span><span class="detail-value">${f.emergencyContact}</span></div>
    ${f.notes?`<div style="margin-top:16px;padding:14px;background:var(--surface);border-radius:var(--radius-sm);font-size:13px;color:var(--body);line-height:1.6"><strong style="color:var(--ink)">Notities:</strong> ${f.notes}</div>`:''}
    <div style="margin-top:20px;display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" style="flex:1">${ICONS.mail} Bericht sturen</button>
      <button class="btn btn-secondary btn-sm" style="flex:1">Bewerk profiel</button>
    </div>
  `;
}

function renderVolAssignModal(eventId, role) {
  const available = DATA.vrijwilligers.list.filter(f=>f.status==='Actief'&&f.skills.includes(role));
  const ev = DATA.vrijwilligers.upcoming.find(u=>u.id===eventId);
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <h2>Vrijwilliger toewijzen — ${role}</h2>
      <button class="btn btn-ghost" onclick="closeModal()" style="font-size:18px">&times;</button>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px">${ev?ev.production:''} — ${ev?ev.date:''}</div>
    <div style="margin-bottom:12px;font-size:13px;font-weight:600;color:var(--ink)">Beschikbare vrijwilligers met vaardigheid "${role}":</div>
    ${available.length>0?available.map(f=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:600;color:var(--ink)">${f.name}</div>
        <div style="font-size:12px;color:var(--muted)">${f.available} — ${f.shifts} shifts dit seizoen</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="closeModal()">Toewijzen</button>
    </div>`).join(''):`<p style="color:var(--muted);font-size:13px;padding:16px 0">Geen beschikbare vrijwilligers met deze vaardigheid. Overweeg een open oproep te versturen.</p>`}
    <div style="margin-top:16px"><button class="btn btn-secondary" style="width:100%">${ICONS.mail} Open oproep versturen naar alle vrijwilligers</button></div>
  `;
}

// ── 14. BENCHMARKS ──
function renderBenchmarks() {
  const el = $('#screen-benchmarks');
  const b = DATA.benchmarks;

  function benchSection(title, items) {
    const maxVal = Math.max(...items.map(i=>Math.max(i.ours,i.sector)))*1.2;
    return `<div class="card section">
      <div class="section-title" style="margin-bottom:20px">${title}</div>
      ${items.map(i=>{
        const oursPct = (i.ours/maxVal*100);
        const sectorPct = (i.sector/maxVal*100);
        const isBetter = i.lowerBetter ? i.ours<i.sector : i.ours>i.sector;
        const diff = i.lowerBetter ? i.sector-i.ours : i.ours-i.sector;
        const diffPct = i.sector>0 ? Math.round(diff/i.sector*100) : 0;
        return `<div style="padding:14px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px;font-weight:500;color:var(--ink)">${i.label}</span>
            <div style="display:flex;align-items:center;gap:12px">
              <span style="font-size:14px;font-weight:700;color:${isBetter?'var(--accent)':'var(--coral)'}">${i.ours}${i.unit}</span>
              <span style="font-size:11px;color:var(--muted)">sector: ${i.sector}${i.unit}</span>
              <span style="font-size:11px;font-weight:600;color:${isBetter?'var(--accent)':'var(--coral)'}; background:${isBetter?'var(--accent-light)':'var(--coral-light)'};padding:2px 8px;border-radius:999px">${isBetter?'+':''}${diffPct}%</span>
            </div>
          </div>
          <div style="display:flex;gap:4px;height:8px">
            <div style="flex:1;background:#EAECF0;border-radius:4px;overflow:hidden;position:relative">
              <div style="height:100%;width:${oursPct}%;background:${isBetter?'var(--accent)':'var(--coral)'};border-radius:4px;opacity:0.85"></div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  el.innerHTML = `
  <div class="topbar"><div><h1>Benchmarks</h1><div class="topbar-sub">Vergelijk je prestaties met ${DATA.coop.houses.length} andere cultuurhuizen (geanonimiseerd)</div></div><div class="topbar-actions"><button class="btn btn-secondary btn-sm">${ICONS.download} Benchmark rapport</button></div></div>
  <div class="content">

    <div class="tabs" id="bench-tabs">
      <button class="tab active" onclick="switchBenchTab('overzicht')">Overzicht</button>
      <button class="tab" onclick="switchBenchTab('communicatie')">Communicatie</button>
      <button class="tab" onclick="switchBenchTab('publiek')">Publiek</button>
      <button class="tab" onclick="switchBenchTab('financieel')">Financieel</button>
      <button class="tab" onclick="switchBenchTab('inclusie')">Inclusie</button>
      <button class="tab" onclick="switchBenchTab('evolutie')">Seizoensevolutie</button>
    </div>

    <div id="bench-tab-overzicht" class="tab-content active">
      <div class="stats-grid">
        ${[
          {label:'Beter dan sector',value:b.communicatie.filter(i=>i.lowerBetter?i.ours<i.sector:i.ours>i.sector).length + b.publiek.filter(i=>i.lowerBetter?i.ours<i.sector:i.ours>i.sector).length + b.financieel.filter(i=>i.lowerBetter?i.ours<i.sector:i.ours>i.sector).length + b.inclusie.filter(i=>i.lowerBetter?i.ours<i.sector:i.ours>i.sector).length,sub:'van ${b.communicatie.length+b.publiek.length+b.financieel.length+b.inclusie.length} metrieken'},
          {label:'Sterkste punt',value:'Open rate',sub:'38,7% vs sector 28%'},
          {label:'Aandachtspunt',value:'No-show',sub:'7,8% — dalend maar boven sector niet'},
          {label:'Deelnemende huizen',value:DATA.coop.houses.length,sub:'Geanonimiseerde vergelijking'},
        ].map(s=>`<div class="card"><div class="stat-label">${s.label}</div><div class="stat-value" style="font-size:${typeof s.value==='string'?'18px':'32px'}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('')}
      </div>
      <div class="grid-2">
        ${benchSection('Communicatie — hoogtepunten', b.communicatie.slice(0,2))}
        ${benchSection('Publiek — hoogtepunten', b.publiek.slice(0,2))}
      </div>
      <div class="card" style="margin-top:20px">
        <div class="section-title" style="margin-bottom:12px">Wat we leren van de sector</div>
        <div class="grid-3">
          <div style="padding:16px;background:var(--surface);border-radius:var(--radius-sm)">
            <div style="font-weight:600;color:var(--ink);margin-bottom:6px">Beste praktijk: Servicemails</div>
            <div style="font-size:13px;color:var(--muted);line-height:1.6">Huizen die 3 dagen voor de voorstelling een locatie- en vervoersmail sturen, zien 40% minder no-shows. Jullie doen dit al.</div>
          </div>
          <div style="padding:16px;background:var(--surface);border-radius:var(--radius-sm)">
            <div style="font-weight:600;color:var(--ink);margin-bottom:6px">Kans: Genre-specifieke campagnes</div>
            <div style="font-size:13px;color:var(--muted);line-height:1.6">Huizen die per genre segmenteren behalen 2x hogere click rates dan algemene nieuwsbrieven. Jullie Meg Stuart-campagne bevestigt dit.</div>
          </div>
          <div style="padding:16px;background:var(--surface);border-radius:var(--radius-sm)">
            <div style="font-weight:600;color:var(--ink);margin-bottom:6px">Trend: Post-visit workflows</div>
            <div style="font-size:13px;color:var(--muted);line-height:1.6">62% van de huizen gebruikt nu automatische na-bezoek mails. Huizen die dit doen zien 15% meer terugkeer bij eerste bezoekers.</div>
          </div>
        </div>
      </div>
    </div>

    <div id="bench-tab-communicatie" class="tab-content">${benchSection('Communicatie', b.communicatie)}</div>
    <div id="bench-tab-publiek" class="tab-content">${benchSection('Publiek & bezetting', b.publiek)}</div>
    <div id="bench-tab-financieel" class="tab-content">${benchSection('Financieel & engagement', b.financieel)}</div>
    <div id="bench-tab-inclusie" class="tab-content">${benchSection('Inclusie & toegankelijkheid', b.inclusie)}</div>

    <div id="bench-tab-evolutie" class="tab-content">
      <div class="card">
        <div class="section-title" style="margin-bottom:20px">Jouw evolutie over 3 seizoenen</div>
        <div class="card" style="padding:0;overflow:hidden;border:none">
          <table><thead><tr><th>Seizoen</th><th style="text-align:right">Bezetting</th><th style="text-align:right">Nieuw publiek</th><th style="text-align:right">Open rate</th><th style="text-align:right">No-show</th><th>Trend</th></tr></thead>
          <tbody>${b.seizoenen.map((s,i)=>{
            const prev = i>0?b.seizoenen[i-1]:null;
            const bezTrend = prev?s.bezetting-prev.bezetting:0;
            return `<tr>
              <td class="contact-name">${s.seizoen}</td>
              <td style="text-align:right;font-weight:600">${s.bezetting}%</td>
              <td style="text-align:right;font-weight:600">${s.nieuwPubliek}%</td>
              <td style="text-align:right;font-weight:600">${s.openRate}%</td>
              <td style="text-align:right;font-weight:600">${s.noShow}%</td>
              <td>${bezTrend>0?`<span style="color:var(--accent);font-weight:600">+${bezTrend.toFixed(1)}%</span>`:bezTrend<0?`<span style="color:var(--coral);font-weight:600">${bezTrend.toFixed(1)}%</span>`:'—'}</td>
            </tr>`;
          }).join('')}</tbody></table>
        </div>
        <div style="margin-top:20px;padding:16px;background:var(--accent-light);border-radius:var(--radius-sm)">
          <div style="font-weight:600;color:#137D5F;margin-bottom:4px">Samenvatting</div>
          <div style="font-size:13px;color:#137D5F;line-height:1.6">Over 3 seizoenen: bezetting +7,4 procentpunt, nieuw publiek +4pp, open rate +6,6pp, no-shows -3,4pp. Alle kernindicatoren bewegen in de juiste richting.</div>
        </div>
      </div>
    </div>

  </div>`;
}
